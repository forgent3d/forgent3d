name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            electron_builder_args: --win
            python_version: '3.13'
          - os: macos-latest
            electron_builder_args: --mac --arm64
            python_version: '3.13'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build renderer
        run: pnpm run build:renderer

      - name: Build Electron main
        run: pnpm run build:electron

      - name: Build embedded export runner
        env:
          PIP_INDEX_URL: https://pypi.org/simple
        run: pnpm run build:runner

      - name: Package app artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder ${{ matrix.electron_builder_args }} --publish never
