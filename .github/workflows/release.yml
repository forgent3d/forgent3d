name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            electron_builder_args: --win
            python_version: '3.13'
            artifact_globs: packages/electron/dist/*.exe
          - os: macos-latest
            electron_builder_args: --mac --arm64
            python_version: '3.13'
            artifact_globs: packages/electron/dist/*.dmg packages/electron/dist/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Sync package version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ -z "$version" || "$version" == "$GITHUB_REF_NAME" ]]; then
            echo "Tag must be in form v<semver>, got: $GITHUB_REF_NAME"
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const p = 'packages/electron/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            console.log('Wrote', p, 'version =', pkg.version);
          " "$version"
          echo "Verifying packages/electron/package.json version:"
          node -e "console.log(require('./packages/electron/package.json').version)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Inspect pip config
        run: |
          python -m pip --version
          python -m pip config debug

      - name: Upgrade pip tooling
        env:
          PIP_INDEX_URL: https://pypi.org/simple
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm run build:renderer

      - name: Build Electron main
        run: pnpm run build:electron

      - name: Build embedded export runner
        env:
          PIP_INDEX_URL: https://pypi.org/simple
        run: pnpm run build:runner

      - name: Prepare App Store Connect API key
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_API_KEY_CONTENT}" ]]; then
            if [[ -z "${APPLE_API_KEY_ID}" ]]; then
              echo "APPLE_API_KEY_ID is required when APPLE_API_KEY is set"
              exit 1
            fi
            key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "${APPLE_API_KEY_CONTENT}" > "${key_path}"
            echo "APPLE_API_KEY=${key_path}" >> "${GITHUB_ENV}"
          fi

      - name: Package app artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (set as repo secrets):
          #   APPLE_CSC_LINK              - base64 of the .p12 Developer ID Application cert
          #   APPLE_CSC_KEY_PASSWORD      - password for the .p12
          #
          # macOS notarization, option A (recommended):
          #   APPLE_API_KEY               - App Store Connect API key contents (.p8)
          #   APPLE_API_KEY_ID            - API key ID
          #   APPLE_API_ISSUER            - issuer UUID
          #
          # macOS notarization, option B:
          #   APPLE_ID                    - Apple ID email
          #   APPLE_APP_SPECIFIC_PASSWORD - app-specific password from appleid.apple.com
          #   APPLE_TEAM_ID               - 10-char Apple team ID
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional; leave unset to ship unsigned NSIS):
          #   WIN_CSC_LINK         - base64 of the .pfx
          #   WIN_CSC_KEY_PASSWORD - password for the .pfx
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm --filter forgent3d exec electron-builder ${{ matrix.electron_builder_args }} --publish always

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes ""
          fi

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(${{ matrix.artifact_globs }})
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found under dist/"
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
